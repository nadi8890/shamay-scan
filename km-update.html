<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>נופר אנרגיה — עדכון קילומטראז'</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#f0f4f8;color:#1e293b;padding:16px;max-width:480px;margin:0 auto}
.hdr{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;border-radius:14px;padding:18px;text-align:center;margin-bottom:16px}
.hdr h1{font-size:1.15rem;font-weight:900}
.hdr .sub{font-size:0.78rem;opacity:.9;margin-top:4px}
.card{background:#fff;border:1.5px solid #dde3ed;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 5px rgba(0,0,0,.05)}
label{display:block;font-size:0.8rem;font-weight:700;color:#475569;margin-bottom:5px}
input{width:100%;border:1.5px solid #dde3ed;border-radius:10px;padding:12px;font-family:'Heebo',sans-serif;font-size:1.15rem;text-align:center;direction:ltr}
.btn{border:none;border-radius:11px;padding:14px;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;width:100%;background:#059669;color:#fff}
.btn:disabled{opacity:.6}
.veh{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px;font-size:0.9rem;margin-bottom:12px}
.err{color:#dc2626;font-size:0.82rem;font-weight:700;margin-top:8px;display:none}
.hint{font-size:0.72rem;color:#64748b;margin-top:5px;text-align:center}
#result{display:none;text-align:center;padding:24px 12px}
#result .big{font-size:3rem}
.status-ok{background:#f0fdf4;border:2px solid #22c55e;border-radius:12px;padding:14px;margin-top:14px;font-size:0.9rem}
.status-warn{background:#fffbeb;border:2px solid #f59e0b;border-radius:12px;padding:14px;margin-top:14px;font-size:0.9rem;font-weight:700}
.status-due{background:#fef2f2;border:2px solid #ef4444;border-radius:12px;padding:14px;margin-top:14px;font-size:0.95rem;font-weight:800}
</style>
</head>
<body>

<div class="hdr">
  <h1>🛣️ עדכון קילומטראז' חודשי</h1>
  <div class="sub">נופר אנרגיה — מחלקת הרכב</div>
</div>

<div id="step-plate" class="card" style="display:none">
  <label>הקלד/י את מספר הרכב שלך (מופיע על לוחית הרישוי)</label>
  <input id="plate-inp" inputmode="numeric" placeholder="12345678">
  <div class="err" id="plate-err"></div>
  <button class="btn" style="margin-top:12px" onclick="findVehicle()">המשך ←</button>
</div>

<div id="step-km" style="display:none">
  <div class="veh" id="veh-info"></div>
  <div class="card">
    <label>קריאת מד המרחק הנוכחית (ק"מ)</label>
    <input id="km-inp" inputmode="numeric" placeholder="">
    <div class="hint" id="km-hint"></div>
    <div class="err" id="km-err"></div>
    <button class="btn" style="margin-top:12px" id="send-btn" onclick="submitKm()">✅ עדכן קילומטראז'</button>
  </div>
</div>

<div id="result">
  <div class="big">✅</div>
  <h2 style="margin:8px 0 4px">הק"מ עודכן — תודה!</h2>
  <div id="service-status"></div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDW6mzShTVBgHH-c5f0hb7FvIRophpgp78",
  authDomain: "niholrechev.firebaseapp.com",
  projectId: "niholrechev",
  storageBucket: "niholrechev.firebasestorage.app",
  messagingSenderId: "347809967171",
  appId: "1:347809967171:web:af3eb5cdeefc827b41f8f6"
});
const db = firebase.firestore();
let VEH = null, MAIL = {}, FLEET = [];
const urlPlate = (new URLSearchParams(location.search).get('plate') || '').replace(/\D/g,'');
const parseKmNum = s => parseInt(String(s||'').replace(/\D/g,'')) || 0;

(async function init() {
  try {
    const snap = await db.collection('fleet').doc('main').get();
    const d = snap.data() || {};
    FLEET = d.vehicles || [];
    MAIL = d.mailSettings || {};
  } catch(e) {}
  if (urlPlate) selectVehicle(urlPlate);
  else document.getElementById('step-plate').style.display = 'block';
})();

function selectVehicle(plateDigits) {
  VEH = FLEET.find(v => (v.plate||'').replace(/\D/g,'') === plateDigits);
  if (!VEH) {
    document.getElementById('step-plate').style.display = 'block';
    const err = document.getElementById('plate-err');
    if (plateDigits) { err.textContent = 'מספר הרכב לא נמצא במערכת — בדוק/י ונסה/י שוב'; err.style.display = 'block'; }
    return;
  }
  document.getElementById('step-plate').style.display = 'none';
  document.getElementById('step-km').style.display = 'block';
  const nm = (VEH.driverName||'').split('-')[0].trim();
  document.getElementById('veh-info').innerHTML = `👤 <b>${nm||'נהג/ת'}</b><br>🚗 ${VEH.make||''} ${VEH.model||''} | <span dir="ltr">${VEH.plate}</span>`;
  const prev = parseKmNum(VEH.currentKm);
  document.getElementById('km-inp').placeholder = prev ? String(prev) : 'לדוגמה: 45000';
  document.getElementById('km-hint').textContent = prev ? `הק"מ האחרון שדווח: ${prev.toLocaleString()}` : '';
}
function findVehicle() {
  document.getElementById('plate-err').style.display = 'none';
  selectVehicle(document.getElementById('plate-inp').value.replace(/\D/g,''));
}

async function submitKm() {
  const err = document.getElementById('km-err');
  err.style.display = 'none';
  const km = parseKmNum(document.getElementById('km-inp').value);
  const prev = parseKmNum(VEH.currentKm);
  if (!km) { err.textContent = 'נא להזין קריאת ק"מ'; err.style.display = 'block'; return; }
  if (prev && km < prev) { err.textContent = `הק"מ שהוזן (${km.toLocaleString()}) נמוך מהדיווח הקודם (${prev.toLocaleString()}) — בדוק/י שוב`; err.style.display = 'block'; return; }
  if (prev && km > prev + 100000) { err.textContent = 'הק"מ שהוזן גבוה באופן חריג — בדוק/י שוב'; err.style.display = 'block'; return; }
  const btn = document.getElementById('send-btn');
  btn.disabled = true; btn.textContent = 'שולח...';
  const now = new Date();
  const p2 = n => String(n).padStart(2,'0');
  const monthKey = `${now.getFullYear()}-${p2(now.getMonth()+1)}`;
  const next = parseKmNum(VEH.nextServiceKm);
  const serviceDue = next > 0 && km >= next;
  const serviceSoon = next > 0 && !serviceDue && (next - km) <= 1000;
  try {
    // 1. km report (one per vehicle per month — overwrites on repeat fill)
    await db.collection('fleet').doc(`kmr_${monthKey}_${VEH.plate}`).set({
      type: 'kmreport', created: Date.now(), monthKey,
      dateStr: `${p2(now.getDate())}/${p2(now.getMonth()+1)}/${now.getFullYear()} ${p2(now.getHours())}:${p2(now.getMinutes())}`,
      plate: VEH.plate, driver: (VEH.driverName||'').split('-')[0].trim(),
      km: String(km), prevKm: String(prev||''), nextServiceKm: String(next||''), serviceDue, serviceSoon
    });
    // 2. update the vehicle's current km (verify + retry against concurrent saves)
    for (let attempt = 0; attempt < 3; attempt++) {
      const snap = await db.collection('fleet').doc('main').get();
      const vehicles = (snap.data()||{}).vehicles || [];
      const v = vehicles.find(x => (x.plate||'').replace(/\D/g,'') === (VEH.plate||'').replace(/\D/g,''));
      if (!v) break;
      if (parseKmNum(v.currentKm) === km) break;
      v.currentKm = String(km);
      await db.collection('fleet').doc('main').set({ vehicles }, { merge: true });
      await new Promise(res => setTimeout(res, 1500));
    }
    // 3. alert the manager by email when a service is due
    if ((serviceDue || serviceSoon) && MAIL.gasUrl) {
      try {
        await fetch(MAIL.gasUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'},
          body: JSON.stringify({ subject: `🔧 ${serviceDue ? 'נדרש טיפול' : 'טיפול מתקרב'} — רכב ${VEH.plate}`, body: `${(VEH.driverName||'').split('-')[0]} עדכן/ה ק"מ: ${km.toLocaleString()}\nטיפול ב: ${next.toLocaleString()}\nרכב: ${VEH.make||''} ${VEH.model||''} (${VEH.plate})`, files: [] }) });
      } catch(e) {}
    }
    // feedback to the driver
    const st = document.getElementById('service-status');
    if (serviceDue) st.innerHTML = `<div class="status-due">🔧 הרכב הגיע לטיפול תקופתי (${next.toLocaleString()} ק"מ)<br>נא לתאם מול קצין הרכב: 054-2840258</div>`;
    else if (serviceSoon) st.innerHTML = `<div class="status-warn">⚠️ הטיפול הבא מתקרב — בעוד ${(next-km).toLocaleString()} ק"מ (ב-${next.toLocaleString()})</div>`;
    else if (next) st.innerHTML = `<div class="status-ok">✓ הכל תקין. הטיפול הבא ב-${next.toLocaleString()} ק"מ (עוד ${(next-km).toLocaleString()} ק"מ)</div>`;
    document.getElementById('step-km').style.display = 'none';
    document.getElementById('result').style.display = 'block';
  } catch(e) {
    btn.disabled = false; btn.textContent = '✅ עדכן קילומטראז\'';
    err.textContent = 'שגיאה בשליחה — בדוק/י חיבור לאינטרנט ונסה/י שוב';
    err.style.display = 'block';
  }
}
</script>
</body>
</html>
